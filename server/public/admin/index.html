<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook Systems - Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .intent-high { color: #dc2626; font-weight: 600; }
    .intent-medium { color: #d97706; font-weight: 600; }
    .intent-low { color: #6b7280; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Login Screen -->
  <div id="login-screen" class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
      <h1 class="text-2xl font-bold text-[#1B3A5C] mb-6 text-center">Admin Dashboard</h1>
      <input id="password-input" type="password" placeholder="Enter password"
        class="w-full px-4 py-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-[#1B3A5C]/30" />
      <button onclick="login()" class="w-full bg-[#1B3A5C] text-white py-3 rounded-lg hover:bg-[#254B73] transition">
        Login
      </button>
      <p id="login-error" class="text-red-500 text-sm mt-2 hidden">Invalid password</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="hidden">
    <nav class="bg-[#1B3A5C] text-white px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-bold">Cook Systems Admin</h1>
      <div class="flex gap-4">
        <button onclick="showTab('sessions')" class="tab-btn hover:underline" data-tab="sessions">Conversations</button>
        <button onclick="showTab('leads')" class="tab-btn hover:underline" data-tab="leads">Leads</button>
        <button onclick="triggerDailySummary()" class="text-sm bg-white/20 px-3 py-1 rounded hover:bg-white/30 transition">Send Daily Summary</button>
        <button onclick="logout()" class="text-sm opacity-70 hover:opacity-100">Logout</button>
      </div>
    </nav>

    <!-- Stats -->
    <div class="max-w-6xl mx-auto px-6 py-6">
      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-white p-4 rounded-lg shadow-sm">
          <div class="text-sm text-gray-500">Today's Conversations</div>
          <div id="stat-conversations" class="text-2xl font-bold text-[#1B3A5C]">-</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow-sm">
          <div class="text-sm text-gray-500">High-Intent Leads</div>
          <div id="stat-high-intent" class="text-2xl font-bold text-red-600">-</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow-sm">
          <div class="text-sm text-gray-500">Appointments Scheduled</div>
          <div id="stat-scheduled" class="text-2xl font-bold text-green-600">-</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow-sm">
          <div class="text-sm text-gray-500">Total Leads</div>
          <div id="stat-total-leads" class="text-2xl font-bold text-[#1B3A5C]">-</div>
        </div>
      </div>

      <!-- Filter -->
      <div class="flex gap-3 mb-4">
        <select id="intent-filter" onchange="loadCurrentTab()" class="px-3 py-2 border rounded-lg text-sm">
          <option value="">All Intent Levels</option>
          <option value="high">🔥 High</option>
          <option value="medium">⚡ Medium</option>
          <option value="low">💤 Low</option>
        </select>
      </div>

      <!-- Sessions Tab -->
      <div id="tab-sessions">
        <table class="w-full bg-white rounded-lg shadow-sm overflow-hidden">
          <thead class="bg-gray-100">
            <tr>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Time</th>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Lead</th>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Messages</th>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Intent</th>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Actions</th>
            </tr>
          </thead>
          <tbody id="sessions-body"></tbody>
        </table>
      </div>

      <!-- Leads Tab -->
      <div id="tab-leads" class="hidden">
        <table class="w-full bg-white rounded-lg shadow-sm overflow-hidden">
          <thead class="bg-gray-100">
            <tr>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Name</th>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Email</th>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Business</th>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Intent</th>
              <th class="text-left px-4 py-3 text-sm font-medium text-gray-600">Last Interaction</th>
            </tr>
          </thead>
          <tbody id="leads-body"></tbody>
        </table>
      </div>

      <!-- Transcript Modal -->
      <div id="transcript-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl w-full max-w-2xl max-h-[80vh] overflow-hidden flex flex-col">
          <div class="px-6 py-4 border-b flex items-center justify-between">
            <h2 class="font-bold text-lg text-[#1B3A5C]">Chat Transcript</h2>
            <button onclick="closeTranscript()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
          </div>
          <div id="transcript-content" class="p-6 overflow-y-auto flex-1 space-y-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin + '/api/admin';
    let token = localStorage.getItem('admin-token');
    let currentTab = 'sessions';

    function headers() {
      return { 'Content-Type': 'application/json', 'X-Admin-Password': token };
    }

    async function login() {
      const pw = document.getElementById('password-input').value;
      const res = await fetch(API + '/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      if (res.ok) {
        const data = await res.json();
        token = data.token;
        localStorage.setItem('admin-token', token);
        showDashboard();
      } else {
        document.getElementById('login-error').classList.remove('hidden');
      }
    }

    function logout() {
      token = null;
      localStorage.removeItem('admin-token');
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('login-screen').classList.remove('hidden');
    }

    async function showDashboard() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      await Promise.all([loadStats(), loadSessions()]);
    }

    async function loadStats() {
      const res = await fetch(API + '/stats', { headers: headers() });
      if (!res.ok) return logout();
      const data = await res.json();
      document.getElementById('stat-conversations').textContent = data.today.conversations;
      document.getElementById('stat-high-intent').textContent = data.today.highIntentLeads;
      document.getElementById('stat-scheduled').textContent = data.today.appointmentsScheduled;
      document.getElementById('stat-total-leads').textContent = data.total.leads;
    }

    async function loadSessions() {
      const intent = document.getElementById('intent-filter').value;
      const url = API + '/sessions' + (intent ? '?intent=' + intent : '');
      const res = await fetch(url, { headers: headers() });
      if (!res.ok) return;
      const data = await res.json();
      const tbody = document.getElementById('sessions-body');
      tbody.innerHTML = data.sessions.map(s => `
        <tr class="border-t hover:bg-gray-50">
          <td class="px-4 py-3 text-sm">${new Date(s.last_message_at).toLocaleString()}</td>
          <td class="px-4 py-3 text-sm">${s.lead_name || 'Anonymous'}${s.lead_email ? '<br><span class="text-xs text-gray-400">' + s.lead_email + '</span>' : ''}</td>
          <td class="px-4 py-3 text-sm">${s.messages_count}</td>
          <td class="px-4 py-3 text-sm intent-${s.intent_level}">${intentBadge(s.intent_level)}</td>
          <td class="px-4 py-3"><button onclick="viewTranscript('${s.id}')" class="text-sm text-[#1B3A5C] hover:underline">View</button></td>
        </tr>
      `).join('');
    }

    async function loadLeads() {
      const intent = document.getElementById('intent-filter').value;
      const url = API + '/leads' + (intent ? '?intent=' + intent : '');
      const res = await fetch(url, { headers: headers() });
      if (!res.ok) return;
      const data = await res.json();
      const tbody = document.getElementById('leads-body');
      tbody.innerHTML = data.leads.map(l => `
        <tr class="border-t hover:bg-gray-50">
          <td class="px-4 py-3 text-sm">${l.name || 'Unknown'}</td>
          <td class="px-4 py-3 text-sm">${l.email || '-'}</td>
          <td class="px-4 py-3 text-sm">${l.business_type || '-'}</td>
          <td class="px-4 py-3 text-sm intent-${l.intent_level}">${intentBadge(l.intent_level)}</td>
          <td class="px-4 py-3 text-sm">${new Date(l.last_interaction).toLocaleString()}</td>
        </tr>
      `).join('');
    }

    async function viewTranscript(sessionId) {
      const res = await fetch(API + '/sessions/' + sessionId, { headers: headers() });
      if (!res.ok) return;
      const data = await res.json();
      const container = document.getElementById('transcript-content');
      container.innerHTML = data.messages.map(m => `
        <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
          <div class="${m.role === 'user' ? 'bg-[#1B3A5C] text-white' : 'bg-gray-100 text-gray-800'} rounded-2xl px-4 py-2.5 max-w-[80%] text-sm">
            ${escapeHtml(m.content)}
            <div class="text-xs mt-1 ${m.role === 'user' ? 'text-white/60' : 'text-gray-400'}">${new Date(m.timestamp).toLocaleTimeString()}</div>
          </div>
        </div>
      `).join('');
      document.getElementById('transcript-modal').classList.remove('hidden');
    }

    function closeTranscript() {
      document.getElementById('transcript-modal').classList.add('hidden');
    }

    function showTab(tab) {
      currentTab = tab;
      document.getElementById('tab-sessions').classList.toggle('hidden', tab !== 'sessions');
      document.getElementById('tab-leads').classList.toggle('hidden', tab !== 'leads');
      loadCurrentTab();
    }

    function loadCurrentTab() {
      if (currentTab === 'sessions') loadSessions();
      else loadLeads();
    }

    async function triggerDailySummary() {
      const res = await fetch(API + '/daily-summary', { method: 'POST', headers: headers() });
      const data = await res.json();
      alert(data.sent ? 'Daily summary sent!' : 'Failed to send summary');
    }

    function intentBadge(level) {
      if (level === 'high') return '🔥 High';
      if (level === 'medium') return '⚡ Medium';
      return '💤 Low';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Auto-login if token exists
    if (token) showDashboard();

    // Enter key on password input
    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
